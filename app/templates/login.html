<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login — Avaliação de Técnicos</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
    <div class="container" style="max-width: 380px; margin-top: 100px; text-align: center;">
        <img src="/static/logo_sistema.png" alt="Sistema FAEC · SENAR Ceará · Sindicato Rural" style="max-width: 260px; width: 100%; height: auto; margin-bottom: 14px;">
        <h1 style="text-align:center;">Avaliação de Técnicos</h1>
        <p class="subtitulo" style="text-align:center;">Acesso do Coordenador/Supervisor</p>

        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}

        <form method="post" action="/login" style="text-align: left;">
            <label for="login">Login</label>
            <input type="text" name="login" id="login" required autofocus>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" required>

            <button type="submit" style="width: 100%;">Entrar</button>
        </form>
    </div>
</body>
</html>
